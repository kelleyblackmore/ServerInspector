# ServerInspect Test Configuration
# Simple configuration that works with both old and new approaches

name: "Simple Test Configuration"
description: "Basic test configuration that works with any system"

# Simple checks
checks:
  - name: "Check for /etc directory"
    type: "file"
    path: "/etc"
    exists: true
    
  - name: "Echo command test"
    type: "command"
    command: "echo Hello World"
    exit_code: 0
    stdout_contains: "Hello World"

# Legacy tests format (for backward compatibility)
tests:
  - name: "Check if /etc directory exists"
    type: "file"
    path: "/etc"
    exists: true
    
  - name: "Check system command output"
    type: "command"
    command: "echo Hello World"
    exit_code: 0
    stdout_contains: "Hello World"

# Output configuration
output:
  format: "text"
  detail_level: "normal"
  save_to_file: false
