services:
  ubuntu:
    build:
      context: .
      dockerfile: Dockerfile.ubuntu
    container_name: serverinspector-ubuntu
    hostname: ubuntu-test
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ../../:/serverinspector:ro
    ports:
      - "2201:22"
    networks:
      testnet:
        ipv4_address: 172.20.0.11
    healthcheck:
      test: ["CMD", "systemctl", "is-active", "sshd"]
      interval: 10s
      timeout: 5s
      retries: 5

  debian:
    build:
      context: .
      dockerfile: Dockerfile.debian
    container_name: serverinspector-debian
    hostname: debian-test
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ../../:/serverinspector:ro
    ports:
      - "2202:22"
    networks:
      testnet:
        ipv4_address: 172.20.0.12
    healthcheck:
      test: ["CMD", "systemctl", "is-active", "sshd"]
      interval: 10s
      timeout: 5s
      retries: 5

  fedora:
    build:
      context: .
      dockerfile: Dockerfile.fedora
    container_name: serverinspector-fedora
    hostname: fedora-test
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ../../:/serverinspector:ro
    ports:
      - "2203:22"
    networks:
      testnet:
        ipv4_address: 172.20.0.13
    healthcheck:
      test: ["CMD", "systemctl", "is-active", "sshd"]
      interval: 10s
      timeout: 5s
      retries: 5

  centos:
    build:
      context: .
      dockerfile: Dockerfile.centos
    container_name: serverinspector-centos
    hostname: centos-test
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ../../:/serverinspector:ro
    ports:
      - "2204:22"
    networks:
      testnet:
        ipv4_address: 172.20.0.14
    healthcheck:
      test: ["CMD", "systemctl", "is-active", "sshd"]
      interval: 10s
      timeout: 5s
      retries: 5

  alpine:
    build:
      context: .
      dockerfile: Dockerfile.alpine
    container_name: serverinspector-alpine
    hostname: alpine-test
    privileged: true
    volumes:
      - ../../:/serverinspector:ro
    ports:
      - "2205:22"
    networks:
      testnet:
        ipv4_address: 172.20.0.15
    healthcheck:
      test: ["CMD", "rc-service", "sshd", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  arch:
    build:
      context: .
      dockerfile: Dockerfile.arch
    container_name: serverinspector-arch
    hostname: arch-test
