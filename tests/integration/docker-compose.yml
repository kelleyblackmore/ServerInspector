    networks:
      testnet:
        ipv4_address: 172.20.0.16
    healthcheck:
      test: ["CMD", "systemctl", "is-active", "sshd"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensuse:
    build:
      context: .
      dockerfile: Dockerfile.opensuse
    container_name: serverinspector-opensuse
    hostname: opensuse-test
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ../../:/serverinspector:ro
    ports:
      - "2207:22"
    networks:
      testnet:
        ipv4_address: 172.20.0.17
    healthcheck:
      test: ["CMD", "systemctl", "is-active", "sshd"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  testnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
