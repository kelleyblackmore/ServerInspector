---
name: Basic System Check
description: Basic checks to validate system configuration

checks:
  - name: Check System Hostname
    type: command
    command: hostname
    exit_code: 0

  - name: Check OS Information
    type: file
    path: /etc/os-release
    exists: true

  - name: Check Kernel Version
    type: command
    command: uname -r
    exit_code: 0

  - name: Check Root Directory Permissions
    type: command
    command: ls -ld /
    exit_code: 0
    contains: "drwxr-xr-x"

report:
  title: "Basic System Check Results"
  format: text
  output: stdout
