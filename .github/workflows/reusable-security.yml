name: Reusable - Security Scan

on:
  workflow_call:
    inputs:
      severity-threshold:
        description: 'Minimum severity to report (LOW, MEDIUM, HIGH, CRITICAL)'
        required: false
        type: string
        default: 'HIGH'
      upload-sarif:
        description: 'Upload results to GitHub Security'
        required: false
        type: boolean
        default: true
    outputs:
      vulnerabilities-found:
        description: 'Number of vulnerabilities found'
        value: ${{ jobs.security.outputs.vuln-count }}

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    outputs:
      vuln-count: ${{ steps.count.outputs.total }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install bandit safety pip-audit

      - name: Run pip-audit
        id: pip-audit
        run: |
          pip-audit --desc --format json --output pip-audit-results.json || true
        continue-on-error: true

      - name: Run safety check
        run: |
          safety check --json --output safety-results.json || true
        continue-on-error: true

      - name: Run bandit
        run: |
          bandit -r src/ -f json -o bandit-results.json -ll || true
        continue-on-error: true

      - name: Count vulnerabilities
        id: count
        run: |
          COUNT=$(cat pip-audit-results.json safety-results.json bandit-results.json 2>/dev/null | grep -o '"severity"' | wc -l || echo "0")
          echo "total=$COUNT" >> $GITHUB_OUTPUT

      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results-${{ github.run_id }}
          path: |
            bandit-results.json
            safety-results.json
            pip-audit-results.json
