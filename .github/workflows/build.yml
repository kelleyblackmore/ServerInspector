name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch:  # Allow manual triggers

jobs:
  build:
    name: Build Executable
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            exec_name: serverinspector-linux
            asset_name: serverinspector-linux
            si_name: si-linux
          - os: windows-latest
            exec_name: serverinspector.exe
            asset_name: serverinspector-windows.exe
            si_name: si-windows.exe
          - os: macos-latest
            exec_name: serverinspector-macos
            asset_name: serverinspector-macos
            si_name: si-macos

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      # Linux-specific setup
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev

      # Build the executable
      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile --name serverinspector --clean src/main.py --add-data "src/serverinspector/templates:templates"

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --name serverinspector --clean src/main.py --add-data "src/serverinspector/templates;templates"

      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onefile --name serverinspector --clean src/main.py --add-data "src/serverinspector/templates:templates"

      # Rename the output file based on OS
      - name: Rename executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mv dist/serverinspector dist/${{ matrix.asset_name }}
          cp dist/${{ matrix.asset_name }} dist/${{ matrix.si_name }}

      - name: Rename executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mv dist/serverinspector dist/${{ matrix.asset_name }}
          cp dist/${{ matrix.asset_name }} dist/${{ matrix.si_name }}

      - name: Rename executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cp dist/serverinspector.exe dist/${{ matrix.si_name }}

      # Upload the executable as an artifact
      - name: Upload executable (full name)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

      # Upload the executable with short name as an artifact
      - name: Upload executable (short name)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.si_name }}
          path: dist/${{ matrix.si_name }}

  # Create a release when a tag is pushed or on main/master branch
  release:
    name: Create Release
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # If this is a tag release
      - name: Create Tag Release
        if: startsWith(github.ref, 'refs/tags/v')
        id: create_tag_release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            artifacts/serverinspector-linux/serverinspector-linux
            artifacts/serverinspector-windows.exe/serverinspector-windows.exe
            artifacts/serverinspector-macos/serverinspector-macos
            artifacts/si-linux/si-linux
            artifacts/si-windows.exe/si-windows.exe
            artifacts/si-macos/si-macos
          name: Release ${{ github.ref_name }}
          body: |
            ## serverinspector ${{ github.ref_name }}

            ### Changes
            - See commit history for changes

            ### Downloads
            #### Full Name:
            - [Linux](serverinspector-linux)
            - [Windows](serverinspector-windows.exe)
            - [macOS](serverinspector-macos)

            #### Short Name (si):
            - [Linux](si-linux)
            - [Windows](si-windows.exe)
            - [macOS](si-macos)

            ### Quick Install
            ```bash
            curl -sSL https://raw.githubusercontent.com/yourusername/serverinspector/main/scripts/install/install.sh | bash
            ```

      # If this is a main/master branch push (not a tag)
      - name: Create Latest Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          gh release delete latest --yes || true
          gh release create latest \
            --title "Latest Build" \
            --notes "This is the latest build from the main branch. It may not be stable." \
            artifacts/serverinspector-linux/serverinspector-linux \
            artifacts/serverinspector-windows.exe/serverinspector-windows.exe \
            artifacts/serverinspector-macos/serverinspector-macos \
            artifacts/si-linux/si-linux \
            artifacts/si-windows.exe/si-windows.exe \
            artifacts/si-macos/si-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
