name: Docker Security Scan

on:
  push:
    branches: [ main ]
    paths:
      - 'docker/**'
      - 'Dockerfile*'
      - '.github/workflows/docker-security.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'docker/**'
      - 'Dockerfile*'
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Mondays at 6 AM UTC
  workflow_dispatch:

jobs:
  docker-scan:
    name: Scan Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Docker images for scanning
      - name: Build main Dockerfile
        run: docker build -f docker/Dockerfile -t serverinspector:test docker/

      - name: Build build Dockerfile
        run: docker build -f docker/Dockerfile.build -t serverinspector:build docker/

      # Scan with Trivy (comprehensive vulnerability scanner)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'serverinspector:test'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy vulnerability scanner (table output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'serverinspector:test'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      # Scan with Docker Scout
      - name: Docker Scout CVE scan
        uses: docker/scout-action@v1
        if: github.event_name == 'pull_request'
        with:
          command: cves
          image: serverinspector:test
          sarif-file: scout-results.sarif
          summary: true

      # Hadolint - Dockerfile linter
      - name: Lint Dockerfiles with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          format: sarif
          output-file: hadolint-results.sarif
          no-fail: true

      - name: Upload Hadolint results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: hadolint-results.sarif

      # Generate SBOM for Docker image
      - name: Generate Docker SBOM
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $(pwd):/output \
            anchore/syft:latest \
            packages docker:serverinspector:test -o cyclonedx-json=/output/docker-sbom.json

      - name: Upload Docker SBOM
        uses: actions/upload-artifact@v7
        with:
          name: docker-sbom
          path: docker-sbom.json
